name: seap

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: seap
      POSTGRES_USER: seap
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-seap_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seap -d seap"]
      interval: 5s
      timeout: 3s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.16
    restart: unless-stopped
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-seap_dev_master_key}
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "${MEILI_PORT:-7700}:7700"
    volumes:
      - meili-data:/meili_data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:7700/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
  meili-data:
